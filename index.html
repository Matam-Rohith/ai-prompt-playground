<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Prompt Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚡ AI Prompt Playground</div>
      <p class="tagline">Learn to write <strong>better prompts</strong> with instant feedback</p>
    </header>

    <main>
      <section class="input-section">
        <label for="promptInput">Enter your prompt below:</label>
        <textarea
          id="promptInput"
          rows="5"
          placeholder="e.g. Write a summary of this article."
        ></textarea>
        <button id="analyzeBtn" onclick="analyzePrompt()">🔍 Analyze Prompt</button>
      </section>

      <section class="output-section" id="outputSection" style="display:none">
        <div class="card issues-card">
          <h2>⚠️ Issues Found</h2>
          <ul id="issuesList"></ul>
        </div>

        <div class="card score-card">
          <h2>📊 Prompt Score</h2>
          <div class="score-circle" id="scoreCircle">
            <span id="scoreValue">0</span><span>/10</span>
          </div>
          <p id="scoreLabel"></p>
        </div>

        <div class="card suggestions-card">
          <h2>✅ Improved Prompt</h2>
          <div class="improved-prompt" id="improvedPrompt"></div>
          <button class="copy-btn" onclick="copyImproved()">📋 Copy Improved Prompt</button>
        </div>

        <div class="card tips-card">
          <h2>💡 Prompt Engineering Tips</h2>
          <ul id="tipsList"></ul>
        </div>
      </section>

      <section class="examples-section">
        <h2>🎓 Try These Examples</h2>
        <div class="examples-grid" id="examplesGrid"></div>
      </section>
    </main>

    <footer>
      <p>Built by <a href="https://rohith-portfolio-six.vercel.app/" target="_blank">Matam Rohith</a> &mdash; No backend. Pure JS magic ✨</p>
    </footer>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
